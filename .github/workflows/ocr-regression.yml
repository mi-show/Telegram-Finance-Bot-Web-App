name: OCR Regression Check

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ocr-regression:
    name: Validate OCR Quality Gates
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: "123456:CI_TEST_TOKEN"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run OCR regression suite
        run: |
          python -m pytest -q \
            tests/test_ocr_regression_corpus.py \
            tests/test_ocr_service.py \
            tests/test_receipt_parser.py
