name: WebApp Smoke Check

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  webapp-smoke:
    name: Validate WebApp API Smoke
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: "123456:CI_TEST_TOKEN"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WebApp smoke tests
        run: |
          python -m pytest -q \
            tests/test_webapp_auth.py \
            tests/test_webapp_api.py
